<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sprite Sheet Studio</title>
    <link rel="icon" href="others/icon.png" type="image/png">
    
    <meta name="theme-color" content="#f3f4f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <!-- 引入资源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 引入 gif.js 用于纯前端导出透明无损 GIF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        body { 
            background-color: #f3f4f6; 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden; 
            -webkit-touch-callout: none;
            user-select: none;
        }
        
        /* 亮色棋盘格背景 */
        .checkered-bg {
            background-image: 
                linear-gradient(45deg, #e5e7eb 25%, transparent 25%), 
                linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #e5e7eb 75%), 
                linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #f9fafb; 
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 99px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.99); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes fastBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .animate-fast-blink { animation: fastBlink 0.5s ease-in-out infinite; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        .custom-slider {
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            border-radius: 9999px;
            outline: none;
            background: #e5e7eb;
        }
        .custom-slider::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: transparent; border: none; border-radius: 9999px;
        }
        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
            background: #111827; cursor: pointer; border: none; margin-top: -5px; transition: transform 0.1s;
        }
        .custom-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

        .picker-cursor { cursor: crosshair !important; }

        .btn-status-icon {
            display: flex; align-items: center; justify-content: center;
            padding: 8px; border-radius: 12px; transition: all 0.2s; color: #94a3b8;
        }
        .btn-status-icon:hover { background-color: #e5e7eb; color: #1e293b; }
        .btn-status-icon.active { background-color: #1e293b; color: #ffffff; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const Icons = {
            Upload: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            Video: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>,
            Grid: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>,
            Download: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Trash: ({ size = 16 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            ChevronUp: ({ size = 16 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"/></svg>,
            ChevronDown: ({ size = 16 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
            Pipette: ({ size = 18 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m2 22 1-1h3l9-9"/><path d="M3 21v-3l9-9"/><path d="m15 6 3.4-3.4a2.1 2.1 0 1 1 3 3L18 9l.4.4a2.1 2.1 0 1 1-3 3l-3.8-3.8a2.1 2.1 0 1 1 3-3l.4.4Z"/></svg>,
            Close: ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Play: ({ size = 18 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
            Pause: ({ size = 18 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>,
            Mirror: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10 20L3 12L10 4V20Z" /><path d="M14 20L21 12L14 4V20Z" /></svg>
        };

        const APP_NAME = "Sprite Sheet Studio";
        const APP_TAGLINE = "A browser-based sprite sheet studio for video, image sequences, and sprite slicing";
        const DEFAULT_VIDEO_EXTRACTION_FPS = 10;
        const VIDEO_SEEK_TIMEOUT_MS = 5000;
        const VIDEO_SEEK_EPSILON_SEC = 1 / 120;
        const QUICK_DURATION_PRESETS = [1, 3, 5, 10];

        function App() {
            const [images, setImages] = useState([]);
            const [settings, setSettings] = useState({ columns: 4, padding: 0, fps: 12, tolerance: 10, saturation: 100, hue: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const [currentFrame, setCurrentFrame] = useState(0);
            const [canvasSize, setCanvasSize] = useState({ width: 0, height: 0 });
            const [previewMode, setPreviewMode] = useState('anim'); 
            const [transparentColor, setTransparentColor] = useState(null);
            const [isPickingColor, setIsPickingColor] = useState(false);
            const [toastMessage, setToastMessage] = useState(null);
            const [isPlaying, setIsPlaying] = useState(true);
            const [isMirrored, setIsMirrored] = useState(false);
            const [shouldShakePickBtn, setShouldShakePickBtn] = useState(false);
            const [videoFile, setVideoFile] = useState(null);
            const [isExtracting, setIsExtracting] = useState(false);
            const [videoMeta, setVideoMeta] = useState(null);
            const [videoExtractSettings, setVideoExtractSettings] = useState({
                startSec: 0,
                durationSec: 5,
                fps: DEFAULT_VIDEO_EXTRACTION_FPS,
                useFullDuration: false
            });
            const [exportMode, setExportMode] = useState('sheet-png');
            const [webpQuality, setWebpQuality] = useState(92);
            const [exportSizing, setExportSizing] = useState({
                mode: 'original',
                maxEdge: 128
            });
            const [dedupeSettings, setDedupeSettings] = useState({
                enabled: false,
                threshold: 8,
                sampleSize: 16
            });
            const [trimSettings, setTrimSettings] = useState({
                enabled: false,
                padding: 0,
                alphaThreshold: 8
            });
            const [importSource, setImportSource] = useState('image'); 

            // 切片预览模态框状态
            const [showSpriteModal, setShowSpriteModal] = useState(false);
            const [spriteGrid, setSpriteGrid] = useState({ rows: 1, cols: 4 });
            const [tempSpriteImage, setTempSpriteImage] = useState(null);
            const trimBoundsCacheRef = useRef(new Map());
            const frameSignatureCacheRef = useRef(new Map());

            const canvasRef = useRef(null);
            const fileInputRef = useRef(null);
            const videoInputRef = useRef(null);
            const spriteSheetInputRef = useRef(null);

            const showToast = useCallback((msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(null), 3000);
            }, []);

            const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
            const getTransparencySettingsKey = () => JSON.stringify({
                transparentColor,
                tolerance: settings.tolerance,
                trim: trimSettings
            });
            const getSignatureSettingsKey = () => JSON.stringify({
                transparentColor,
                tolerance: settings.tolerance,
                trim: trimSettings,
                hue: settings.hue,
                saturation: settings.saturation,
                mirrored: isMirrored,
                dedupe: dedupeSettings
            });

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                    if (e.code === 'Space') {
                        e.preventDefault();
                        setIsPlaying(prev => !prev);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            useEffect(() => {
                trimBoundsCacheRef.current.clear();
            }, [images, transparentColor, settings.tolerance, trimSettings]);

            useEffect(() => {
                frameSignatureCacheRef.current.clear();
            }, [images, transparentColor, settings.tolerance, trimSettings, settings.hue, settings.saturation, isMirrored, dedupeSettings]);

            const handleFiles = async (files) => {
                const validFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
                if (validFiles.length === 0) return;
                setImportSource('image'); setVideoFile(null); setVideoMeta(null); setCurrentFrame(0);
                const newImages = await Promise.all(validFiles.map(file => {
                    return new Promise(resolve => {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const img = new Image();
                            img.onload = () => resolve({ id: Math.random().toString(36).substr(2, 9), url: e.target.result, img, width: img.width, height: img.height, name: file.name });
                            img.src = e.target.result;
                        };
                        reader.readAsDataURL(file);
                    });
                }));
                newImages.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
                setImages(newImages);
            };

            const waitForVideoFrame = (video) => new Promise((resolve) => {
                if (typeof video.requestVideoFrameCallback === 'function') {
                    video.requestVideoFrameCallback(() => resolve());
                } else {
                    requestAnimationFrame(() => resolve());
                }
            });

            const seekVideoToTime = (video, targetTime) => new Promise((resolve, reject) => {
                const maxSeekTime = Math.max(0, (video.duration || 0) - VIDEO_SEEK_EPSILON_SEC);
                const safeTargetTime = Math.max(0, Math.min(targetTime, maxSeekTime));

                if (Math.abs(video.currentTime - safeTargetTime) <= VIDEO_SEEK_EPSILON_SEC) {
                    waitForVideoFrame(video).then(resolve);
                    return;
                }

                let settled = false;
                const cleanup = () => {
                    clearTimeout(timeoutId);
                    video.removeEventListener('seeked', onSeeked);
                    video.removeEventListener('error', onError);
                };
                const onSeeked = () => {
                    if (settled) return;
                    settled = true;
                    cleanup();
                    waitForVideoFrame(video).then(resolve);
                };
                const onError = () => {
                    if (settled) return;
                    settled = true;
                    cleanup();
                    reject(new Error('Video seek failed'));
                };
                const timeoutId = setTimeout(() => {
                    if (settled) return;
                    settled = true;
                    cleanup();
                    reject(new Error(`Video seek timed out at ${safeTargetTime.toFixed(3)}s`));
                }, VIDEO_SEEK_TIMEOUT_MS);

                video.addEventListener('seeked', onSeeked);
                video.addEventListener('error', onError);
                video.currentTime = safeTargetTime;
            });

            const getVideoExtractionPlan = (video, extractSettings) => {
                const videoDuration = Math.max(0, video.duration || 0);
                const startSec = clamp(Number(extractSettings.startSec) || 0, 0, videoDuration);
                const availableDuration = Math.max(0, videoDuration - startSec);
                const durationSec = extractSettings.useFullDuration
                    ? availableDuration
                    : clamp(Number(extractSettings.durationSec) || 0, 0.1, Math.max(0.1, availableDuration));
                const extractionDuration = Math.max(0, Math.min(durationSec, availableDuration));
                const extractionFps = clamp(Math.round(Number(extractSettings.fps) || DEFAULT_VIDEO_EXTRACTION_FPS), 1, 60);

                if (!Number.isFinite(extractionDuration) || extractionDuration <= 0) {
                    return {
                        startSec,
                        durationSec: 0,
                        extractionFps,
                        frameCount: 1,
                        timestamps: [clamp(startSec, 0, Math.max(0, videoDuration - VIDEO_SEEK_EPSILON_SEC))]
                    };
                }

                const frameCount = Math.max(1, Math.ceil(extractionDuration * extractionFps));
                const maxCaptureTime = Math.max(0, startSec + extractionDuration - VIDEO_SEEK_EPSILON_SEC);
                const timestamps = Array.from({ length: frameCount }, (_, index) => {
                    const rawTime = startSec + index / extractionFps;
                    return Math.min(rawTime, maxCaptureTime);
                });

                return {
                    startSec,
                    durationSec: extractionDuration,
                    extractionFps,
                    frameCount,
                    timestamps
                };
            };

            const extractVideoFrames = async (file, extractSettings = videoExtractSettings) => {
                if (!file) return;

                setImportSource('video');
                setVideoFile(file);
                setIsExtracting(true);
                setCurrentFrame(0);

                const video = document.createElement('video');
                const objectUrl = URL.createObjectURL(file);
                video.muted = true;
                video.preload = "auto";
                video.playsInline = true;

                try {
                    await new Promise((resolve, reject) => {
                        video.onloadedmetadata = resolve;
                        video.onerror = () => reject(new Error('Video metadata failed to load'));
                        video.src = objectUrl;
                    });

                    video.pause();
                    const nativeFps = (() => {
                        if (!video.duration || !Number.isFinite(video.duration) || !video.duration) return null;
                        const browserFrameEstimate = video.webkitDecodedFrameCount && video.webkitDecodedFrameCount > 0
                            ? video.webkitDecodedFrameCount / video.duration
                            : null;
                        return browserFrameEstimate ? Number(browserFrameEstimate.toFixed(2)) : null;
                    })();
                    setVideoMeta({
                        duration: video.duration || 0,
                        width: video.videoWidth,
                        height: video.videoHeight,
                        name: file.name,
                        nativeFps
                    });

                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    if (!ctx) throw new Error('Canvas 2D context not available');
                    const plan = getVideoExtractionPlan(video, extractSettings);
                    const timestamps = plan.timestamps;
                    const frames = [];

                    for (let i = 0; i < timestamps.length; i++) {
                        await seekVideoToTime(video, timestamps[i]);
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(video, 0, 0);

                        const dataUrl = canvas.toDataURL('image/png');
                        const img = new Image();
                        await new Promise((resolve, reject) => {
                            img.onload = resolve;
                            img.onerror = () => reject(new Error('Extracted frame failed to load'));
                            img.src = dataUrl;
                        });

                        frames.push({
                            id: Math.random().toString(36).substr(2, 9),
                            url: dataUrl,
                            img,
                            width: img.width,
                            height: img.height,
                            name: `v_frame_${i}.png`
                        });
                    }

                    setImages(frames);
                } catch (err) {
                    console.error(err);
                    showToast("❌ 视频提帧失败，请重试");
                } finally {
                    URL.revokeObjectURL(objectUrl);
                    setIsExtracting(false);
                }
            };

            const handleVideo = async (e, nextExtractSettings = videoExtractSettings) => {
                const file = e?.target?.files?.[0];
                if (!file) return;
                await extractVideoFrames(file, nextExtractSettings);
                if (e?.target) e.target.value = null;
            };

            // 导入雪碧图：跳出带辅助网格的实时预览模态框
            const handleSpriteSheet = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        setTempSpriteImage(img);
                        setSpriteGrid({ rows: 1, cols: 4 });
                        setShowSpriteModal(true);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
                if (e.target) e.target.value = null; // 允许重复导入同一张
            };

            // 手动设定行和列，确认切割
            const confirmSpriteSheetSlice = () => {
                if (!tempSpriteImage) return;
                setIsExtracting(true);
                setShowSpriteModal(false);
                setTimeout(() => {
                    const { rows, cols } = spriteGrid;
                    const img = tempSpriteImage;
                    const frameW = img.width / cols;
                    const frameH = img.height / rows;
                    const frames = [];
                    
                    for(let y=0; y<rows; y++) {
                        for(let x=0; x<cols; x++) {
                            const startX = Math.round(x * frameW);
                            const startY = Math.round(y * frameH);
                            const drawW = Math.max(1, Math.round(frameW));
                            const drawH = Math.max(1, Math.round(frameH));
                            
                            const fCanvas = document.createElement('canvas');
                            fCanvas.width = drawW; fCanvas.height = drawH;
                            const fCtx = fCanvas.getContext('2d');
                            fCtx.drawImage(img, startX, startY, drawW, drawH, 0, 0, drawW, drawH);
                            
                            const fImg = new Image();
                            fImg.src = fCanvas.toDataURL();
                            frames.push({
                                id: Math.random().toString(36).substr(2,9),
                                url: fImg.src, img: fImg, width: drawW, height: drawH,
                                name: `s_frame_${y}_${x}.png`
                            });
                        }
                    }
                    setImages(frames);
                    setCurrentFrame(0);
                    setImportSource('spritesheet'); // 标记来源为已切割雪碧图
                    setVideoFile(null);
                    setVideoMeta(null);
                    setTempSpriteImage(null);
                    setIsExtracting(false);
                    showToast(`✅ 成功切割为 ${cols * rows} 帧`);
                }, 50);
            };

            const onDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
            const onDragLeave = (e) => { e.preventDefault(); setIsDragging(false); };
            const onDrop = (e) => {
                e.preventDefault(); setIsDragging(false);
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    const file = e.dataTransfer.files[0];
                    if (file.type.startsWith('video/')) {
                        setImportSource('video'); setVideoFile(file);
                        handleVideo({ target: { files: [file] } });
                    } else handleFiles(e.dataTransfer.files);
                }
            };

            const handleCanvasClick = (e) => {
                if (!isPickingColor || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = Math.floor((e.clientX - rect.left) * scaleX);
                const y = Math.floor((e.clientY - rect.top) * scaleY);
                const ctx = canvas.getContext('2d');
                const pixel = ctx.getImageData(x, y, 1, 1).data;
                if (pixel[3] > 0) setTransparentColor({ r: pixel[0], g: pixel[1], b: pixel[2] });
                setIsPickingColor(false);
            };

            const isTransparentPixel = (r, g, b, a) => {
                if (a < trimSettings.alphaThreshold) return true;
                if (transparentColor && !isPickingColor) {
                    const tol = settings.tolerance;
                    return Math.abs(r - transparentColor.r) <= tol
                        && Math.abs(g - transparentColor.g) <= tol
                        && Math.abs(b - transparentColor.b) <= tol;
                }
                return false;
            };

            const getFrameSourceRect = (imgObj) => {
                if (!imgObj) return { sx: 0, sy: 0, sw: 1, sh: 1 };
                if (!trimSettings.enabled) {
                    return { sx: 0, sy: 0, sw: imgObj.width, sh: imgObj.height };
                }

                const cacheKey = `${imgObj.id}::${getTransparencySettingsKey()}`;
                const cached = trimBoundsCacheRef.current.get(cacheKey);
                if (cached) return cached;

                const canvas = document.createElement('canvas');
                canvas.width = imgObj.width;
                canvas.height = imgObj.height;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                if (!ctx) {
                    const fallback = { sx: 0, sy: 0, sw: imgObj.width, sh: imgObj.height };
                    trimBoundsCacheRef.current.set(cacheKey, fallback);
                    return fallback;
                }

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(imgObj.img, 0, 0);

                const { data } = ctx.getImageData(0, 0, canvas.width, canvas.height);
                let minX = canvas.width;
                let minY = canvas.height;
                let maxX = -1;
                let maxY = -1;

                for (let y = 0; y < canvas.height; y++) {
                    for (let x = 0; x < canvas.width; x++) {
                        const idx = (y * canvas.width + x) * 4;
                        if (!isTransparentPixel(data[idx], data[idx + 1], data[idx + 2], data[idx + 3])) {
                            if (x < minX) minX = x;
                            if (y < minY) minY = y;
                            if (x > maxX) maxX = x;
                            if (y > maxY) maxY = y;
                        }
                    }
                }

                if (maxX < minX || maxY < minY) {
                    const fallback = { sx: 0, sy: 0, sw: imgObj.width, sh: imgObj.height };
                    trimBoundsCacheRef.current.set(cacheKey, fallback);
                    return fallback;
                }

                const padding = Math.max(0, Math.round(trimSettings.padding || 0));
                const rect = {
                    sx: Math.max(0, minX - padding),
                    sy: Math.max(0, minY - padding),
                    sw: Math.min(imgObj.width, maxX + padding + 1) - Math.max(0, minX - padding),
                    sh: Math.min(imgObj.height, maxY + padding + 1) - Math.max(0, minY - padding)
                };
                trimBoundsCacheRef.current.set(cacheKey, rect);
                return rect;
            };

            const buildFrameLayout = (frameList) => {
                return buildFrameLayoutFor(frameList, false);
            };

            const buildFrameLayoutFor = (frameList, forExport = false) => {
                const validImages = frameList.filter(i => i && i.img);
                let frames = validImages.map((imgObj) => {
                    const sourceRect = getFrameSourceRect(imgObj);
                    const baseWidth = sourceRect.sw;
                    const baseHeight = sourceRect.sh;
                    const scale = forExport && exportSizing.mode === 'max-edge'
                        ? Math.max(0.01, (Math.max(1, exportSizing.maxEdge) / Math.max(1, Math.max(baseWidth, baseHeight))))
                        : 1;
                    return {
                        imgObj,
                        sourceRect,
                        baseWidth,
                        baseHeight,
                        scale,
                        width: Math.max(1, Math.round(baseWidth * scale)),
                        height: Math.max(1, Math.round(baseHeight * scale))
                    };
                });

                if (forExport) {
                    frames = dedupeFramesForExport(frames);
                }

                const cellWidth = frames.length > 0 ? Math.max(...frames.map(f => f.width)) : 0;
                const cellHeight = frames.length > 0 ? Math.max(...frames.map(f => f.height)) : 0;
                let columns = settings.columns > 0 ? settings.columns : Math.ceil(Math.sqrt(frames.length || 1));
                if (columns === 0) columns = 4;
                const rows = Math.max(1, Math.ceil((frames.length || 1) / Math.max(1, columns)));
                const sheetWidth = columns * cellWidth + Math.max(0, columns - 1) * settings.padding;
                const sheetHeight = rows * cellHeight + Math.max(0, rows - 1) * settings.padding;

                return {
                    frames,
                    cellWidth,
                    cellHeight,
                    columns,
                    rows,
                    sheetWidth,
                    sheetHeight
                };
            };

            const applyTransparencyMask = (ctx, w, h, mode = 'alpha') => {
                if (!transparentColor && mode !== 'gif') return;

                const idata = ctx.getImageData(0, 0, w, h);
                const d = idata.data;
                const tc = transparentColor;
                const tol = settings.tolerance;

                for (let i = 0; i < d.length; i += 4) {
                    let isTransparent = false;

                    if (mode === 'gif' && d[i + 3] < 128) {
                        isTransparent = true;
                    } else if (tc && !isPickingColor) {
                        if (Math.abs(d[i] - tc.r) <= tol && Math.abs(d[i + 1] - tc.g) <= tol && Math.abs(d[i + 2] - tc.b) <= tol) {
                            isTransparent = true;
                        }
                    }

                    if (mode === 'gif') {
                        if (isTransparent) {
                            d[i] = 0;
                            d[i + 1] = 255;
                            d[i + 2] = 0;
                            d[i + 3] = 255;
                        } else {
                            d[i + 3] = 255;
                            if (d[i] === 0 && d[i + 1] === 255 && d[i + 2] === 0) {
                                d[i + 1] = 254;
                            }
                        }
                    } else if (isTransparent) {
                        d[i + 3] = 0;
                    }
                }

                ctx.putImageData(idata, 0, 0);
            };

            const drawFrameToCanvas = (ctx, frame, canvasWidth, canvasHeight) => {
                ctx.clearRect(0, 0, canvasWidth, canvasHeight);
                ctx.save();
                ctx.filter = `saturate(${settings.saturation}%) hue-rotate(${settings.hue}deg)`;
                const drawX = (canvasWidth - frame.width) / 2;
                const drawY = (canvasHeight - frame.height) / 2;
                if (isMirrored) {
                    ctx.translate(canvasWidth, 0);
                    ctx.scale(-1, 1);
                    ctx.drawImage(
                        frame.imgObj.img,
                        frame.sourceRect.sx,
                        frame.sourceRect.sy,
                        frame.sourceRect.sw,
                        frame.sourceRect.sh,
                        canvasWidth - drawX - frame.width,
                        drawY,
                        frame.width,
                        frame.height
                    );
                } else {
                    ctx.drawImage(
                        frame.imgObj.img,
                        frame.sourceRect.sx,
                        frame.sourceRect.sy,
                        frame.sourceRect.sw,
                        frame.sourceRect.sh,
                        drawX,
                        drawY,
                        frame.width,
                        frame.height
                    );
                }
                ctx.restore();
            };

            const drawSheetToCanvas = (ctx, layout, canvasWidth) => {
                ctx.clearRect(0, 0, layout.sheetWidth, layout.sheetHeight);
                ctx.save();
                ctx.filter = `saturate(${settings.saturation}%) hue-rotate(${settings.hue}deg)`;
                if (isMirrored) { ctx.translate(canvasWidth, 0); ctx.scale(-1, 1); }
                layout.frames.forEach((frame, idx) => {
                    const col = idx % layout.columns;
                    const row = Math.floor(idx / layout.columns);
                    const drawX = col * (layout.cellWidth + settings.padding) + (layout.cellWidth - frame.width) / 2;
                    const drawY = row * (layout.cellHeight + settings.padding) + (layout.cellHeight - frame.height) / 2;
                    ctx.drawImage(
                        frame.imgObj.img,
                        frame.sourceRect.sx,
                        frame.sourceRect.sy,
                        frame.sourceRect.sw,
                        frame.sourceRect.sh,
                        drawX,
                        drawY,
                        frame.width,
                        frame.height
                    );
                });
                ctx.restore();
            };

            const createSheetCanvas = (layout) => {
                const canvas = document.createElement('canvas');
                canvas.width = layout.sheetWidth;
                canvas.height = layout.sheetHeight;
                const ctx = canvas.getContext('2d');
                if (!ctx) throw new Error('Canvas 2D context not available');
                drawSheetToCanvas(ctx, layout, layout.sheetWidth);
                if (transparentColor && !isPickingColor) {
                    applyTransparencyMask(ctx, layout.sheetWidth, layout.sheetHeight, 'alpha');
                }
                return canvas;
            };

            const generateGifBlob = async (layout) => {
                if (!window.GIF) throw new Error('GIF engine not ready');

                const exportW = Math.max(1, Math.round(layout.cellWidth));
                const exportH = Math.max(1, Math.round(layout.cellHeight));
                const workerRes = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
                if (!workerRes.ok) throw new Error("Worker fetch failed");
                const workerText = await workerRes.text();
                const workerBlob = new Blob([workerText], { type: 'application/javascript' });
                const workerUrl = URL.createObjectURL(workerBlob);

                return await new Promise((resolve, reject) => {
                    try {
                        const gif = new window.GIF({
                            workers: 4,
                            quality: 10,
                            width: exportW,
                            height: exportH,
                            workerScript: workerUrl,
                            transparent: 0x00FF00
                        });

                        const c = document.createElement('canvas');
                        c.width = exportW;
                        c.height = exportH;
                        const ctx = c.getContext('2d', { willReadFrequently: true });
                        if (!ctx) throw new Error('Canvas 2D context not available');

                        layout.frames.forEach((frame) => {
                            drawFrameToCanvas(ctx, frame, exportW, exportH);
                            applyTransparencyMask(ctx, exportW, exportH, 'gif');
                            gif.addFrame(c, { copy: true, delay: Math.max(10, Math.round(1000 / settings.fps)) });
                        });

                        gif.on('finished', function(blob) {
                            URL.revokeObjectURL(workerUrl);
                            resolve(blob);
                        });
                        gif.on('abort', function() {
                            URL.revokeObjectURL(workerUrl);
                            reject(new Error('GIF export aborted'));
                        });

                        gif.render();
                    } catch (error) {
                        URL.revokeObjectURL(workerUrl);
                        reject(error);
                    }
                });
            };

            const generateSheetExport = async (mode = exportMode) => {
                const layout = buildFrameLayoutFor(images, true);
                if (mode === 'gif') {
                    const blob = await generateGifBlob(layout);
                    return {
                        blob,
                        layout,
                        extension: 'gif',
                        filename: `${getExportBaseName()}_sheet.gif`
                    };
                }

                const isWebP = mode === 'sheet-webp';
                const mime = isWebP ? 'image/webp' : 'image/png';
                const extension = isWebP ? 'webp' : 'png';
                const canvas = createSheetCanvas(layout);
                const blob = await canvasToBlobAsync(
                    canvas,
                    mime,
                    isWebP ? clamp(webpQuality / 100, 0.1, 1) : undefined
                );

                return {
                    blob,
                    layout,
                    extension,
                    filename: `${getExportBaseName()}_sheet.${extension}`
                };
            };

            const canvasToBlobAsync = (canvas, mime, quality) => new Promise((resolve, reject) => {
                canvas.toBlob((blob) => {
                    if (blob) resolve(blob);
                    else reject(new Error(`Failed to encode canvas as ${mime}`));
                }, mime, quality);
            });

            const exportBlobDownload = (blob, filename) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                setTimeout(() => URL.revokeObjectURL(url), 1000);
            };

            const getExportBaseName = () => {
                const raw = videoMeta?.name || 'sprite_asset';
                const normalized = raw.replace(/\.[^.]+$/, '').replace(/[^a-zA-Z0-9_-]+/g, '_');
                return normalized || 'sprite_asset';
            };

            const getFrameSignature = (frame) => {
                const sampleSize = Math.max(4, Math.round(dedupeSettings.sampleSize || 16));
                const cacheKey = `${frame.imgObj.id}::${frame.sourceRect.sx},${frame.sourceRect.sy},${frame.sourceRect.sw},${frame.sourceRect.sh}::${getSignatureSettingsKey()}`;
                const cached = frameSignatureCacheRef.current.get(cacheKey);
                if (cached) return cached;

                const canvas = document.createElement('canvas');
                canvas.width = sampleSize;
                canvas.height = sampleSize;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                if (!ctx) {
                    const fallback = new Uint8ClampedArray(sampleSize * sampleSize * 4);
                    frameSignatureCacheRef.current.set(cacheKey, fallback);
                    return fallback;
                }

                drawFrameToCanvas(ctx, frame, sampleSize, sampleSize);
                applyTransparencyMask(ctx, sampleSize, sampleSize, 'alpha');
                const signature = ctx.getImageData(0, 0, sampleSize, sampleSize).data;
                frameSignatureCacheRef.current.set(cacheKey, signature);
                return signature;
            };

            const getSignatureDifference = (a, b) => {
                if (!a || !b || a.length !== b.length) return Number.POSITIVE_INFINITY;
                let total = 0;
                for (let i = 0; i < a.length; i++) {
                    total += Math.abs(a[i] - b[i]);
                }
                return total / a.length;
            };

            const dedupeFramesForExport = (frames) => {
                if (!dedupeSettings.enabled || frames.length <= 1) return frames;

                const kept = [];
                let lastSignature = null;
                const threshold = Math.max(0, dedupeSettings.threshold || 0);

                frames.forEach((frame) => {
                    const signature = getFrameSignature(frame);
                    if (!lastSignature) {
                        kept.push(frame);
                        lastSignature = signature;
                        return;
                    }

                    const diff = getSignatureDifference(lastSignature, signature);
                    if (diff > threshold) {
                        kept.push(frame);
                        lastSignature = signature;
                    }
                });

                return kept.length > 0 ? kept : frames.slice(0, 1);
            };

            const drawCore = (ctx, w, h, isSheet) => {
                if (images.length === 0) return;
                ctx.clearRect(0, 0, w, h);
                if (isSheet) {
                    const layout = buildFrameLayout(images);
                    if (layout.frames.length === 0) return;
                    drawSheetToCanvas(ctx, layout, w);
                } else {
                    ctx.save();
                    ctx.filter = `saturate(${settings.saturation}%) hue-rotate(${settings.hue}deg)`;
                    if (isMirrored) { ctx.translate(w, 0); ctx.scale(-1, 1); }
                    const target = images[currentFrame] || images[0];
                    if (target && target.img) {
                        const rect = getFrameSourceRect(target);
                        ctx.drawImage(
                            target.img,
                            rect.sx,
                            rect.sy,
                            rect.sw,
                            rect.sh,
                            0,
                            0,
                            rect.sw,
                            rect.sh
                        );
                    }
                    ctx.restore();
                }
                
                // 实时处理透明逻辑
                if (transparentColor && !isPickingColor) {
                    applyTransparencyMask(ctx, w, h, 'alpha');
                }
            };

            const updateCanvas = useCallback(() => {
                if (!canvasRef.current || images.length === 0) { setCanvasSize({ width: 0, height: 0 }); return; }
                const canvas = canvasRef.current;
                if (previewMode === 'sheet') {
                    const layout = buildFrameLayout(images);
                    const w = layout.sheetWidth;
                    const h = layout.sheetHeight;
                    canvas.width = w; canvas.height = h; setCanvasSize({ width: w, height: h });
                    drawCore(canvas.getContext('2d'), w, h, true);
                } else {
                    const f = images[currentFrame] || images[0]; if (!f) return;
                    const rect = getFrameSourceRect(f);
                    canvas.width = rect.sw;
                    canvas.height = rect.sh;
                    setCanvasSize({ width: rect.sw, height: rect.sh });
                    drawCore(canvas.getContext('2d'), rect.sw, rect.sh, false);
                }
            }, [images, settings, transparentColor, isPickingColor, previewMode, currentFrame, isMirrored, importSource, trimSettings]);

            useEffect(() => { updateCanvas(); }, [updateCanvas]);

            useEffect(() => {
                if (images.length <= 1 || !isPlaying) return;
                const itv = setInterval(() => setCurrentFrame(p => (p + 1) % images.length), 1000 / settings.fps);
                return () => clearInterval(itv);
            }, [images.length, settings.fps, isPlaying]);

            const getSequenceExportFormatForMode = (mode = exportMode) => (
                mode === 'sheet-webp' ? 'webp' : 'png'
            );

            const generateFrameSequenceExport = async (format = 'png') => {
                const isWebP = format === 'webp';
                const mime = isWebP ? 'image/webp' : 'image/png';
                const ext = isWebP ? 'webp' : 'png';
                const layout = buildFrameLayoutFor(images, true);
                const baseName = getExportBaseName();
                const files = [];

                for (let index = 0; index < layout.frames.length; index++) {
                    const frame = layout.frames[index];
                    const canvas = document.createElement('canvas');
                    canvas.width = frame.width;
                    canvas.height = frame.height;
                    const ctx = canvas.getContext('2d');
                    if (!ctx) throw new Error('Canvas 2D context not available');

                    drawFrameToCanvas(ctx, frame, frame.width, frame.height);
                    applyTransparencyMask(ctx, frame.width, frame.height, 'alpha');

                    const blob = await canvasToBlobAsync(
                        canvas,
                        mime,
                        isWebP ? clamp(webpQuality / 100, 0.1, 1) : undefined
                    );

                    files.push({
                        index,
                        frame,
                        blob,
                        filename: `${baseName}_frame_${String(index).padStart(3, '0')}.${ext}`
                    });
                }

                return {
                    layout,
                    files,
                    extension: ext
                };
            };

            const handleExport = async () => {
                if (images.length === 0 || isExtracting) return;
                const exportLabel = exportMode === 'gif'
                    ? 'GIF'
                    : (exportMode === 'sheet-webp' ? 'WebP Sheet' : 'PNG Sheet');

                setIsExtracting(true);
                showToast(`⏳ 导出 ${exportLabel} 中...`);

                try {
                    const result = await generateSheetExport(exportMode);
                    exportBlobDownload(result.blob, result.filename);
                    showToast(`✅ ${exportLabel} 导出成功！`);
                } catch (error) {
                    console.error(error);
                    showToast(`❌ ${exportLabel} 导出失败，请重试`);
                } finally {
                    setIsExtracting(false);
                }
            };

            const handleExportSequence = async (format = 'png') => {
                if (images.length === 0 || isExtracting) return;
                const isWebP = format === 'webp';

                setIsExtracting(true);
                showToast(isWebP ? "⏳ 批量导出 WebP 帧中..." : "⏳ 批量导出 PNG 帧中...");

                try {
                    const sequenceExport = await generateFrameSequenceExport(format);

                    for (const file of sequenceExport.files) {
                        exportBlobDownload(file.blob, file.filename);
                        await new Promise(resolve => setTimeout(resolve, 50));
                    }

                    showToast(isWebP ? "✅ WebP 帧序列导出完成！" : "✅ PNG 帧序列导出完成！");
                } catch (error) {
                    console.error(error);
                    showToast("❌ 批量导出帧失败，请重试");
                } finally {
                    setIsExtracting(false);
                }
            };

            const handleExportZip = async () => {
                if (images.length === 0 || isExtracting) return;
                if (!window.JSZip) {
                    showToast("❌ ZIP 引擎未就绪，请刷新重试");
                    return;
                }

                setIsExtracting(true);
                showToast("⏳ 打包 ZIP 中...");

                try {
                    const baseName = getExportBaseName();
                    const zip = new window.JSZip();
                    const sheetExport = await generateSheetExport(exportMode);
                    const sequenceFormat = getSequenceExportFormatForMode(exportMode);
                    const sequenceExport = await generateFrameSequenceExport(sequenceFormat);
                    const metadata = buildExportMetadata(sheetExport.layout);

                    zip.file(sheetExport.filename, sheetExport.blob);
                    zip.file(`${baseName}_metadata.json`, JSON.stringify(metadata, null, 2));
                    sequenceExport.files.forEach((file) => {
                        zip.file(`frames/${file.filename}`, file.blob);
                    });

                    const zipBlob = await zip.generateAsync({
                        type: 'blob',
                        compression: 'DEFLATE',
                        compressionOptions: { level: 6 }
                    });

                    exportBlobDownload(zipBlob, `${baseName}_bundle.zip`);
                    showToast("✅ ZIP 打包导出成功！");
                } catch (error) {
                    console.error(error);
                    showToast("❌ ZIP 打包失败，请重试");
                } finally {
                    setIsExtracting(false);
                }
            };

            const buildExportMetadata = (layoutOverride = null) => {
                const layout = layoutOverride || buildFrameLayoutFor(images, true);
                const validImages = layout.frames;
                const sourceFrameCount = images.filter(i => i && i.img).length;
                const removedFrameCount = Math.max(0, sourceFrameCount - validImages.length);

                return {
                    generatedAt: new Date().toISOString(),
                    importSource,
                    sourceFrameCount,
                    frameCount: validImages.length,
                    removedFrameCount,
                    exportMode,
                    maxFrameWidth: layout.cellWidth,
                    maxFrameHeight: layout.cellHeight,
                    columns: layout.columns,
                    rows: layout.rows,
                    padding: settings.padding,
                    previewFps: settings.fps,
                    sheetWidth: layout.sheetWidth,
                    sheetHeight: layout.sheetHeight,
                    mirrored: isMirrored,
                    trim: {
                        enabled: trimSettings.enabled,
                        padding: trimSettings.padding,
                        alphaThreshold: trimSettings.alphaThreshold
                    },
                    dedupe: {
                        enabled: dedupeSettings.enabled,
                        threshold: dedupeSettings.threshold,
                        sampleSize: dedupeSettings.sampleSize,
                        removedFrames: removedFrameCount
                    },
                    exportSizing,
                    webpQuality: exportMode === 'sheet-webp' ? webpQuality : null,
                    sequenceFormat: getSequenceExportFormatForMode(exportMode),
                    colorAdjustments: {
                        saturation: settings.saturation,
                        hue: settings.hue
                    },
                    transparency: transparentColor ? {
                        color: transparentColor,
                        tolerance: settings.tolerance
                    } : null,
                    sequence: validImages.map((frame, index) => ({
                        index,
                        name: frame.imgObj.name,
                        width: frame.width,
                        height: frame.height,
                        sourceRect: frame.sourceRect
                    })),
                    sourceVideo: videoMeta ? {
                        name: videoMeta.name,
                        width: videoMeta.width,
                        height: videoMeta.height,
                        duration: videoMeta.duration,
                        nativeFps: videoMeta.nativeFps
                    } : null,
                    extraction: importSource === 'video' && videoMeta ? {
                        startSec: videoExtractSettings.startSec,
                        durationSec: videoExtractSettings.useFullDuration
                            ? Math.max(0, videoMeta.duration - videoExtractSettings.startSec)
                            : videoExtractSettings.durationSec,
                        fps: videoExtractSettings.fps,
                        useFullDuration: videoExtractSettings.useFullDuration
                    } : null
                };
            };

            const handleExportMetadata = () => {
                if (images.length === 0) return;
                const metadata = buildExportMetadata();
                const blob = new Blob([JSON.stringify(metadata, null, 2)], { type: 'application/json' });
                exportBlobDownload(blob, `${getExportBaseName()}_metadata.json`);
                showToast("✅ 元数据 JSON 导出成功！");
            };

            const rerunVideoExtraction = async (overrides = {}) => {
                if (!videoFile || isExtracting) return;
                const nextSettings = { ...videoExtractSettings, ...overrides };
                setVideoExtractSettings(nextSettings);
                await extractVideoFrames(videoFile, nextSettings);
            };

            const handleDurationChange = (val) => {
                const nextSettings = {
                    ...videoExtractSettings,
                    durationSec: val,
                    useFullDuration: false
                };
                setVideoExtractSettings(nextSettings);
                if (videoFile) extractVideoFrames(videoFile, nextSettings);
            };

            const handleToleranceChange = (v) => {
                if (!transparentColor) { setShouldShakePickBtn(true); setTimeout(() => setShouldShakePickBtn(false), 500); return; }
                setSettings({...settings, tolerance: v});
            };

            const removeImage = (id) => {
                setImages(prev => {
                    const next = prev.filter(img => img.id !== id);
                    if (currentFrame >= next.length && next.length > 0) setCurrentFrame(next.length - 1);
                    return next;
                });
            };

            const clearAll = () => {
                setImages([]);
                setTransparentColor(null);
                setVideoFile(null);
                setVideoMeta(null);
                setCurrentFrame(0);
                setExportMode('sheet-png');
                setImportSource('image');
                setTempSpriteImage(null);
                setShowSpriteModal(false);
            };

            const moveImage = (idx, dir) => {
                const newI = [...images];
                if (dir === 'up' && idx > 0) [newI[idx - 1], newI[idx]] = [newI[idx], newI[idx - 1]];
                if (dir === 'down' && idx < images.length - 1) [newI[idx + 1], newI[idx]] = [newI[idx], newI[idx + 1]];
                setImages(newI);
            };

            const Slider = ({ label, value, min, max, onChange, suffix = '' }) => (
                <div className="flex flex-col gap-1.5">
                    <div className="flex justify-between text-[11px] font-black text-gray-500 uppercase tracking-widest text-left">
                        <span>{label}</span>
                        <span className="text-gray-900 font-mono">{value===0 && !suffix ? 'AUTO' : `${value}${suffix}`}</span>
                    </div>
                    <input type="range" min={min} max={max} value={value} onChange={e=>onChange(parseInt(e.target.value))} className="custom-slider w-full" style={{ background: `linear-gradient(to right, #111827 ${((value-min)/(max-min || 1))*100}%, #e5e7eb ${((value-min)/(max-min || 1))*100}%)` }} />
                </div>
            );

            const exportSheetLabel = exportMode === 'gif'
                ? '导出 GIF'
                : (exportMode === 'sheet-webp' ? '导出 WebP Sheet' : '导出 PNG Sheet');
            const extractionPreview = videoMeta ? getVideoExtractionPlan(videoMeta, videoExtractSettings) : null;

            return (
                <div className="h-[100dvh] flex flex-col items-center justify-center p-4 text-gray-900 bg-gray-100">
                    <input type="file" ref={fileInputRef} onChange={e=>handleFiles(e.target.files)} accept="image/*" multiple className="hidden" />
                    <input type="file" ref={videoInputRef} onChange={handleVideo} accept="video/*" className="hidden" />
                    <input type="file" ref={spriteSheetInputRef} onChange={handleSpriteSheet} accept="image/*" className="hidden" />

                    {/* 全局 Toast 提示 - 绝对无阴影无边框 */}
                    {toastMessage && (
                        <div className="fixed top-10 left-1/2 -translate-x-1/2 z-[200] bg-gray-900 text-white px-8 py-4 rounded-full animate-pop-in flex items-center gap-3">
                            <span className="text-[12px] font-black tracking-widest">{toastMessage}</span>
                        </div>
                    )}

                    {/* 雪碧图切割实时网格预览模态框 */}
                    {showSpriteModal && (

                                    )}
                                </div>
                                <footer className="h-16 relative flex items-center justify-between px-6 bg-white opacity-90 shrink-0 border-t border-gray-50">
                                    <div className="flex flex-col text-left flex-1"><span className="text-[9px] font-black uppercase text-gray-400 tracking-widest leading-none">系统状态 / Status</span><span className="text-[11px] font-black tracking-wider text-gray-600 leading-none mt-1 uppercase">{isExtracting ? 'Processing...' : 'Signal: Nominal'}</span></div>
                                    <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center gap-1 bg-gray-50 px-4 py-1.5 rounded-full pointer-events-auto border-none">
                                        <button className={`btn-status-icon border-none ${isPlaying ? 'active' : ''}`} onClick={() => setIsPlaying(true)} title="播放"><Icons.Play size={18} /></button>
                                        <button className={`btn-status-icon border-none ${!isPlaying ? 'active' : ''}`} onClick={() => setIsPlaying(false)} title="暂停"><Icons.Pause size={18} /></button>
                                        <div className="w-px h-5 bg-gray-200 mx-2" />
                                        <button className={`btn-status-icon border-none ${isMirrored ? 'active' : ''}`} onClick={() => setIsMirrored(!isMirrored)} title="镜像翻转"><Icons.Mirror size={20} /></button>
                                    </div>
                                    <div className="text-right flex flex-col text-right flex-1 items-end"><span className="text-[9px] font-black uppercase text-gray-400 tracking-widest leading-none">信息 / Info</span><span className="text-[11px] font-mono font-black uppercase text-gray-600 leading-none mt-1">{previewMode==='anim' ? `F:${currentFrame+1}/${images.length}` : `W:${canvasSize.width} H:${canvasSize.height}`}</span></div>
                                </footer>
                            </div>

                            <aside className="w-[320px] bg-white p-4 rounded-[28px] flex flex-col overflow-hidden shrink-0 border-none">
                                <div className="bg-gray-50 rounded-[24px] p-5 flex-1 flex flex-col overflow-hidden text-left border-none">
                                    <div className="flex justify-between items-center mb-5 text-left">
                                        <p className="text-[13px] font-black text-gray-400 uppercase tracking-widest leading-none">帧序列 / Sequence ({images.length})</p>
                                        {images.length>0 && <button onClick={clearAll} className="text-[13px] font-black text-red-500 hover:text-red-700 transition-colors uppercase border-none bg-transparent">清空</button>}
                                    </div>
                                    <div className="flex-1 overflow-y-auto custom-scrollbar -mx-2 px-2 space-y-3 text-left">
                                        {images.length===0 ? <div className="text-center text-gray-300 text-[12px] font-black uppercase mt-12 py-8 rounded-[24px] bg-gray-100/50">EMPTY LIST</div> : images.map((img, idx)=>(
                                            <div key={img.id} className={`flex items-center gap-3 p-3 rounded-[20px] transition-all duration-200 border-none ${currentFrame===idx&&previewMode==='anim'?'bg-gray-200':'bg-white hover:bg-gray-50'}`}>
                                                <div className="w-14 h-14 bg-gray-100 rounded-[16px] flex items-center justify-center overflow-hidden shrink-0 border-none"><img src={img.url} className="max-w-full max-h-full object-contain" alt="thumb" /></div>
                                                <div className="flex-1 min-w-0 flex flex-col justify-center"><p className="text-[13px] font-black text-gray-900 truncate leading-tight mb-1" title={img.name}>{img.name}</p><p className="text-[11px] font-black text-gray-400 font-mono uppercase leading-tight">{img.width}x{img.height}</p></div>
                                                <div className="flex items-center gap-2 shrink-0">
                                                    <div className="flex flex-col gap-1"><button onClick={()=>moveImage(idx,'up')} disabled={idx===0} className="text-gray-300 hover:text-gray-900 disabled:opacity-20 transition-colors border-none bg-transparent"><Icons.ChevronUp size={14} /></button><button onClick={()=>moveImage(idx,'down')} disabled={idx===images.length-1} className="text-gray-300 hover:text-gray-900 disabled:opacity-20 transition-colors border-none bg-transparent"><Icons.ChevronDown size={14} /></button></div>
                                                    <button onClick={()=>removeImage(img.id)} className="w-10 h-10 flex items-center justify-center bg-red-50 text-red-500 hover:bg-red-100 hover:text-red-700 rounded-[12px] transition-all ml-1 border-none"><Icons.Trash size={16} /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </aside>
                        </main>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
