<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GBG Sprite Sheet Maker 精灵图实验室</title>
    <link rel="icon" href="others/icon.png" type="image/png">
    
    <meta name="theme-color" content="#f3f4f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <!-- 引入资源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 引入 gif.js 用于纯前端导出透明无损 GIF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    
    <style>
        body { 
            background-color: #f3f4f6; 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden; 
            -webkit-touch-callout: none;
            user-select: none;
        }
        
        /* 亮色棋盘格背景 */
        .checkered-bg {
            background-image: 
                linear-gradient(45deg, #e5e7eb 25%, transparent 25%), 
                linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #e5e7eb 75%), 
                linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #f9fafb; 
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 99px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.99); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes fastBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .animate-fast-blink { animation: fastBlink 0.5s ease-in-out infinite; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        .custom-slider {
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            border-radius: 9999px;
            outline: none;
            background: #e5e7eb;
        }
        .custom-slider::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: transparent; border: none; border-radius: 9999px;
        }
        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
            background: #111827; cursor: pointer; border: none; margin-top: -5px; transition: transform 0.1s;
        }
        .custom-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

        @keyframes coffee-pulse {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .btn-coffee-lab {
            position: relative; overflow: hidden; z-index: 1; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-coffee-lab::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(-45deg, #1677ff, #07c160, #1677ff, #07c160);
            background-size: 400% 400%; opacity: 0; z-index: -1; transition: opacity 0.6s ease;
        }
        .btn-coffee-lab:hover::before { opacity: 1; animation: coffee-pulse 8s ease infinite; }
        .btn-coffee-lab:hover { transform: scale(1.05); color: white !important; }

        .picker-cursor { cursor: crosshair !important; }

        .btn-status-icon {
            display: flex; align-items: center; justify-content: center;
            padding: 8px; border-radius: 12px; transition: all 0.2s; color: #94a3b8;
        }
        .btn-status-icon:hover { background-color: #e5e7eb; color: #1e293b; }
        .btn-status-icon.active { background-color: #1e293b; color: #ffffff; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const Icons = {
            Upload: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            Video: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>,
            Grid: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>,
            Download: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Trash: ({ size = 16 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            ChevronUp: ({ size = 16 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"/></svg>,
            ChevronDown: ({ size = 16 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
            Pipette: ({ size = 18 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m2 22 1-1h3l9-9"/><path d="M3 21v-3l9-9"/><path d="m15 6 3.4-3.4a2.1 2.1 0 1 1 3 3L18 9l.4.4a2.1 2.1 0 1 1-3 3l-3.8-3.8a2.1 2.1 0 1 1 3-3l.4.4Z"/></svg>,
            Coffee: ({ size = 18 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="13" y1="1" x2="13" y2="4"/></svg>,
            Close: ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Play: ({ size = 18 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
            Pause: ({ size = 18 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>,
            Mirror: ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10 20L3 12L10 4V20Z" /><path d="M14 20L21 12L14 4V20Z" /></svg>
        };

        const DefaultAvatar = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23111827'/%3E%3Ccircle cx='50' cy='40' r='20' fill='%23f3f4f6'/%3E%3Cpath d='M20 90 Q50 60 80 90' stroke='%23f3f4f6' stroke-width='10' fill='none'/%3E%3C/svg%3E";

        function App() {
            const [images, setImages] = useState([]);
            const [settings, setSettings] = useState({ columns: 0, padding: 0, fps: 12, tolerance: 10, saturation: 100, hue: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const [currentFrame, setCurrentFrame] = useState(0);
            const [canvasSize, setCanvasSize] = useState({ width: 0, height: 0 });
            const [previewMode, setPreviewMode] = useState('anim'); 
            const [transparentColor, setTransparentColor] = useState(null);
            const [isPickingColor, setIsPickingColor] = useState(false);
            const [showUIMenu, setShowUIMenu] = useState(false);
            const [toastMessage, setToastMessage] = useState(null);
            const avatarClickCount = useRef(0);
            const avatarClickTimer = useRef(null);
            const [showDonationModal, setShowDonationModal] = useState(false);
            const [isPlaying, setIsPlaying] = useState(true);
            const [isMirrored, setIsMirrored] = useState(false);
            const [shouldShakePickBtn, setShouldShakePickBtn] = useState(false);
            const [videoFile, setVideoFile] = useState(null);
            const [isExtracting, setIsExtracting] = useState(false);
            const [videoDurationSetting, setVideoDurationSetting] = useState(5); 
            const [importSource, setImportSource] = useState('image'); // 'image', 'video', 'spritesheet'
            
            const [originalSpriteSheet, setOriginalSpriteSheet] = useState(null);

            const canvasRef = useRef(null);
            const fileInputRef = useRef(null);
            const videoInputRef = useRef(null);
            const spriteSheetInputRef = useRef(null);
            const uiRuleInputRef = useRef(null);

            const showToast = useCallback((msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(null), 3000);
            }, []);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                    if (e.code === 'Space') {
                        e.preventDefault();
                        setIsPlaying(prev => !prev);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            // 隐藏彩蛋：0.6秒内连点三次头像触发开发者菜单
            const handleAvatarClick = () => {
                avatarClickCount.current += 1;
                if (avatarClickCount.current === 3) {
                    setShowUIMenu(prev => !prev);
                    avatarClickCount.current = 0;
                    clearTimeout(avatarClickTimer.current);
                } else {
                    clearTimeout(avatarClickTimer.current);
                    avatarClickTimer.current = setTimeout(() => {
                        avatarClickCount.current = 0;
                    }, 600);
                }
            };

            const handleDownloadUIRules = () => {
                const uiRules = {
                    name: "GBG-UI-Genesis-Rules-Pro-Final",
                    version: "19.0",
                    description: "GBG 视觉宇宙最高规范。规定了绝对扁平化、无阴影、大圆角、雪碧图导出纯净透明无损 GIF 的核心逻辑，以及开发者菜单隐藏交互的实现。",
                    designPhilosophy: {
                        style: "Absolute Flat Design (No borders, No shadows). 严禁使用任何 Tailwind 的 shadow 和 border 属性类。",
                        visualLayers: "依靠纯净的背景色差区分功能区 (bg-white, bg-gray-50, bg-gray-100)。",
                        cornerSystem: "Outer Containers: 28px, Inner Cards: 24px/20px, All Buttons & Navs: rounded-full",
                        scrollbar: "Zero vertical scroll on main layout. 紧凑排版，一屏展示完。"
                    },
                    headerSpecs: {
                        avatar: { src: "others/xieyoujune.jpg", size: "44x44px", shape: "rounded-full", interaction: "连点3次触发开发者菜单" },
                        links: [
                            { text: "独立音乐人", url: "https://music.163.com/#/artist?id=1184020" },
                            { text: "《人生之旅》游戏开发者", url: "https://www.xiaohongshu.com/user/profile/63cac1130000000026006f9a" }
                        ],
                        coffeeAnimation: {
                            style: "linear-gradient(-45deg, #1677ff, #07c160, #1677ff, #07c160)",
                            duration: "8s infinite pulse"
                        }
                    },
                    functionalLogic: {
                        exportLogic: "【硬性规定】无论导入何种格式，凡是导入[雪碧图]工作流，必须且只能使用 gif.js 导出 [纯净透明、单帧原尺寸、不压缩质量] 的 GIF。不可导出视频。渲染方法：使用 quality:10 实现极速渲染，transparent: 0x00FF00 数字形式定义透明抠像。为了防毛边边缘发黑，需将低于 Alpha 128 的像素强制置为透明绿 #00ff00，其余全不透明。"
                    }
                };
                const blob = new Blob([JSON.stringify(uiRules, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `GBG_Genesis_Rules.json`; a.click();
                setShowUIMenu(false);
                showToast("✅ GBG 核心规范 JSON 已导出");
            };

            const handleUploadUIRules = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const rules = JSON.parse(event.target.result);
                        if (rules.name && rules.name.includes("GBG-UI")) showToast("✅ 规范文件已识别并导入成功");
                        else showToast("❌ 非标规范文件");
                    } catch (err) { showToast("❌ JSON 解析失败"); }
                };
                reader.readAsText(file);
                setShowUIMenu(false);
                if (uiRuleInputRef.current) uiRuleInputRef.current.value = '';
            };

            const handleFiles = async (files) => {
                const validFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
                if (validFiles.length === 0) return;
                setImportSource('image'); setVideoFile(null); setOriginalSpriteSheet(null); setCurrentFrame(0);
                const newImages = await Promise.all(validFiles.map(file => {
                    return new Promise(resolve => {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const img = new Image();
                            img.onload = () => resolve({ id: Math.random().toString(36).substr(2, 9), url: e.target.result, img, width: img.width, height: img.height, name: file.name });
                            img.src = e.target.result;
                        };
                        reader.readAsDataURL(file);
                    });
                }));
                newImages.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
                setImages(newImages);
            };

            const handleVideo = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setImportSource('video'); setVideoFile(file); setOriginalSpriteSheet(null);
                setIsExtracting(true); setCurrentFrame(0);
                const video = document.createElement('video');
                video.src = URL.createObjectURL(file); video.muted = true; video.preload = "auto";
                video.onloadedmetadata = async () => {
                    try {
                        const canvas = document.createElement('canvas'); canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                        const ctx = canvas.getContext('2d'); const frames = [];
                        const frameCount = videoDurationSetting === 1 ? 5 : (videoDurationSetting === 10 ? 48 : 24);
                        const step = Math.min(video.duration, videoDurationSetting) / frameCount;
                        for (let i = 0; i < frameCount; i++) {
                            video.currentTime = i * step;
                            await new Promise(res => { video.onseeked = res; setTimeout(res, 1000); });
                            ctx.drawImage(video, 0, 0);
                            const img = new Image(); await new Promise(r => { img.onload = r; img.src = canvas.toDataURL('image/png'); });
                            frames.push({ id: Math.random().toString(36).substr(2, 9), url: img.src, img, width: img.width, height: img.height, name: `v_frame_${i}.png` });
                        }
                        URL.revokeObjectURL(video.src); setIsExtracting(false); setImages(frames);
                    } catch (err) { setIsExtracting(false); }
                };
            };

            // 智能切割核心引擎：投影检测法 + 去底联动
            const sliceSpriteSheet = useCallback((img, colsSetting, tColor, tol) => {
                setIsExtracting(true);
                setTimeout(() => {
                    const canvas = document.createElement('canvas');
                    const w = Math.round(img.width); const h = Math.round(img.height);
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    // 如果指定了透明色，预先干掉背景
                    const imgData = ctx.getImageData(0, 0, w, h);
                    const data = imgData.data;
                    if (tColor) {
                        const {r, g, b} = tColor;
                        for (let i=0; i<data.length; i+=4) {
                            if (Math.abs(data[i]-r)<=tol && Math.abs(data[i+1]-g)<=tol && Math.abs(data[i+2]-b)<=tol) {
                                data[i+3] = 0; // 彻底透明化
                            }
                        }
                        ctx.putImageData(imgData, 0, 0);
                    }

                    const isSolid = (x, y) => data[(y * w + x) * 4 + 3] > 0;

                    let cols = colsSetting;
                    let rows = 1;

                    // AUTO 模式智能检测间隙
                    if (cols === 0) { 
                        let emptyCols = [];
                        for (let x = 0; x < w; x++) {
                            let empty = true;
                            for (let y = 0; y < h; y++) { if (isSolid(x, y)) { empty = false; break; } }
                            if (empty) emptyCols.push(x);
                        }
                        let emptyRows = [];
                        for (let y = 0; y < h; y++) {
                            let empty = true;
                            for (let x = 0; x < w; x++) { if (isSolid(x, y)) { empty = false; break; } }
                            if (empty) emptyRows.push(y);
                        }

                        const getSegments = (emptyArr, maxVal) => {
                            const segments = []; let start = 0;
                            for(let i=0; i<emptyArr.length; i++) {
                                if(emptyArr[i] > start) segments.push({start: start, end: emptyArr[i]});
                                start = emptyArr[i] + 1;
                            }
                            if(maxVal > start) segments.push({start: start, end: maxVal});
                            return segments.filter(s => s.end - s.start > 2);
                        };

                        const xSegments = getSegments(emptyCols, w);
                        const ySegments = getSegments(emptyRows, h);

                        if (xSegments.length > 0 && ySegments.length > 0) {
                            cols = xSegments.length;
                            rows = ySegments.length;
                            showToast(`✨ 智能切割完成: ${cols} 列 x ${rows} 行`);
                        } else {
                            cols = 4; 
                            rows = Math.max(1, Math.round(h / (w / cols)));
                            if (!tColor) showToast("⚠️ 未检测到透明间隙，已均分切割。请吸取并去除背景底色重试");
                        }
                    } else {
                        rows = Math.max(1, Math.round(h / (w / cols)));
                    }

                    // 切片生成为独立 PNG 对象
                    const frameW = w / cols;
                    const frameH = h / rows;
                    const frames = [];
                    
                    for(let y=0; y<rows; y++) {
                        for(let x=0; x<cols; x++) {
                            const startX = Math.round(x * frameW);
                            const startY = Math.round(y * frameH);
                            const drawW = Math.max(1, Math.round(frameW));
                            const drawH = Math.max(1, Math.round(frameH));
                            
                            const fCanvas = document.createElement('canvas');
                            fCanvas.width = drawW; fCanvas.height = drawH;
                            const fCtx = fCanvas.getContext('2d');
                            fCtx.putImageData(ctx.getImageData(startX, startY, drawW, drawH), 0, 0);
                            
                            const fImg = new Image();
                            fImg.src = fCanvas.toDataURL();
                            frames.push({
                                id: Math.random().toString(36).substr(2,9),
                                url: fImg.src, img: fImg, width: drawW, height: drawH,
                                name: `s_frame_${y}_${x}.png`
                            });
                        }
                    }
                    setImages(frames);
                    setCurrentFrame(0);
                    setIsExtracting(false);
                }, 50);
            }, [showToast]);

            useEffect(() => {
                if (importSource === 'spritesheet' && originalSpriteSheet) {
                    sliceSpriteSheet(originalSpriteSheet, settings.columns, transparentColor, settings.tolerance);
                }
            }, [originalSpriteSheet, settings.columns, transparentColor, settings.tolerance, importSource, sliceSpriteSheet]);

            const handleSpriteSheet = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setImportSource('spritesheet'); setVideoFile(null); setCurrentFrame(0);
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        setOriginalSpriteSheet(img); 
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const onDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
            const onDragLeave = (e) => { e.preventDefault(); setIsDragging(false); };
            const onDrop = (e) => {
                e.preventDefault(); setIsDragging(false);
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    const file = e.dataTransfer.files[0];
                    if (file.type.startsWith('video/')) {
                        setImportSource('video'); setVideoFile(file); setOriginalSpriteSheet(null);
                        handleVideo({ target: { files: [file] } });
                    } else handleFiles(e.dataTransfer.files);
                }
            };

            const handleCanvasClick = (e) => {
                if (!isPickingColor || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = Math.floor((e.clientX - rect.left) * scaleX);
                const y = Math.floor((e.clientY - rect.top) * scaleY);
                const ctx = canvas.getContext('2d');
                const pixel = ctx.getImageData(x, y, 1, 1).data;
                if (pixel[3] > 0) setTransparentColor({ r: pixel[0], g: pixel[1], b: pixel[2] });
                setIsPickingColor(false);
            };

            const drawCore = (ctx, w, h, isSheet) => {
                if (images.length === 0) return;
                ctx.clearRect(0, 0, w, h);
                ctx.save();
                ctx.filter = `saturate(${settings.saturation}%) hue-rotate(${settings.hue}deg)`;
                if (isMirrored) { ctx.translate(w, 0); ctx.scale(-1, 1); }
                if (isSheet) {
                    const valid = images.filter(i => i && i.img);
                    if (valid.length === 0) return;
                    const mw = Math.max(...valid.map(i => i.width)); const mh = Math.max(...valid.map(i => i.height));
                    let cols = settings.columns > 0 ? settings.columns : Math.ceil(Math.sqrt(valid.length));
                    if (cols === 0) cols = 4;
                    valid.forEach((imgObj, idx) => {
                        const col = idx % cols; const row = Math.floor(idx / cols);
                        ctx.drawImage(imgObj.img, col*(mw+settings.padding) + (mw-imgObj.width)/2, row*(mh+settings.padding) + (mh-imgObj.height)/2);
                    });
                } else {
                    const target = images[currentFrame] || images[0];
                    if (target && target.img) ctx.drawImage(target.img, 0, 0);
                }
                ctx.restore();
                
                // 非雪碧图渲染时处理透明逻辑
                if (transparentColor && !isPickingColor && importSource !== 'spritesheet') {
                    const idata = ctx.getImageData(0, 0, w, h); const d = idata.data; const {r,g,b} = transparentColor; const tol = settings.tolerance;
                    for (let i=0; i<d.length; i+=4) if (Math.abs(d[i]-r)<=tol && Math.abs(d[i+1]-g)<=tol && Math.abs(d[i+2]-b)<=tol) d[i+3]=0;
                    ctx.putImageData(idata, 0, 0);
                }
            };

            const updateCanvas = useCallback(() => {
                if (!canvasRef.current || images.length === 0) { setCanvasSize({ width: 0, height: 0 }); return; }
                const canvas = canvasRef.current;
                if (previewMode === 'sheet') {
                    const mw = Math.max(...images.map(i => i.width)); const mh = Math.max(...images.map(i => i.height));
                    let cols = settings.columns > 0 ? settings.columns : Math.ceil(Math.sqrt(images.length));
                    if (cols === 0) cols = 4;
                    const w = cols * mw + (cols - 1) * settings.padding;
                    const h = Math.ceil(images.length / cols) * mh + (Math.ceil(images.length / cols) - 1) * settings.padding;
                    canvas.width = w; canvas.height = h; setCanvasSize({ width: w, height: h });
                    drawCore(canvas.getContext('2d'), w, h, true);
                } else {
                    const f = images[currentFrame] || images[0]; if (!f) return;
                    canvas.width = f.width; canvas.height = f.height; setCanvasSize({ width: f.width, height: f.height });
                    drawCore(canvas.getContext('2d'), f.width, f.height, false);
                }
            }, [images, settings, transparentColor, isPickingColor, previewMode, currentFrame, isMirrored, importSource]);

            useEffect(() => { updateCanvas(); }, [updateCanvas]);

            useEffect(() => {
                if (images.length <= 1 || !isPlaying) return;

                return () => clearInterval(itv);

            // 完美的导出双轨：导入雪碧图出极速无损透明GIF；否则出大尺寸PNG雪碧图
            const handleExport = () => {
                if (images.length === 0) return;
                
                const isExportingGif = importSource === 'spritesheet';

                if (isExportingGif) {
                    if (!window.GIF) { showToast("❌ GIF 引擎未就绪，请刷新重试"); return; }
                    setIsExtracting(true);
                    showToast("⏳ 极速渲染无损透明 GIF...");

                    const validImages = images.filter(i => i && i.img);
                    
                    // 【致命修复】: 保证传给 getImageData 和 gif.js 的宽高为绝对的整型！
                    const exportW = Math.max(1, Math.round(validImages[0].width));
                    const exportH = Math.max(1, Math.round(validImages[0].height));

                    const workerBlob = new Blob([`importScripts('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');`], { type: 'application/javascript' });
                    const workerUrl = URL.createObjectURL(workerBlob);

                    const gif = new window.GIF({
                        workers: 4, // 多线程极速渲染
                        quality: 10, // 画质10渲染速度飞快，对于像素/动画已足够无损
                        width: exportW,
                        height: exportH,
                        workerScript: workerUrl,
                        transparent: 0x00FF00 // 指定极限绿幕为透明色 (必须是Hex Number)
                    });

                    const c = document.createElement('canvas');
                    c.width = exportW;
                    c.height = exportH;
                    const ctx = c.getContext('2d', { willReadFrequently: true });

                    validImages.forEach((imgObj) => {
                        ctx.clearRect(0, 0, exportW, exportH);
                        
                        // 铺满极限绿幕 #00ff00
                        ctx.fillStyle = '#00FF00';
                        ctx.fillRect(0, 0, exportW, exportH);

                        ctx.save();
                        ctx.filter = `saturate(${settings.saturation}%) hue-rotate(${settings.hue}deg)`;
                        if (isMirrored) {
                            ctx.translate(exportW, 0);
                            ctx.scale(-1, 1);
                        }
                        
                        // 绘制单帧 (原图如有透明通道，底下绿幕会透出来)
                        ctx.drawImage(imgObj.img, 0, 0, exportW, exportH);
                        ctx.restore();

                        // 剔除防毛边/反走样的半透明噪点，硬边缘化
                        const idata = ctx.getImageData(0, 0, exportW, exportH);
                        const d = idata.data;

                        for (let i = 0; i < d.length; i += 4) {
                            let isTransparent = false;
                            if (d[i+3] < 128) {
                                isTransparent = true;
                            }
                            
                            if (isTransparent) {
                                d[i] = 0; d[i+1] = 255; d[i+2] = 0; d[i+3] = 255; // 强制绿幕
                            } else {
                                d[i+3] = 255; // 强制全不透明，消灭毛边黑圈
                            }
                        }
                        ctx.putImageData(idata, 0, 0);

                        gif.addFrame(c, { copy: true, delay: Math.max(10, Math.round(1000 / settings.fps)) });
                    });

                    gif.on('finished', function(blob) {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `gbg_anim_${Date.now()}.gif`;
                        a.click();
                        URL.revokeObjectURL(url);
                        URL.revokeObjectURL(workerUrl);
                        setIsExtracting(false);
                        showToast("✅ 无损 GIF 导出成功！");
                    });

                    gif.render();
                } else {
                    // 非雪碧图来源，强制导出 PNG 大图
                    const tmp = document.createElement('canvas');
                    const mw = Math.max(...images.map(i => i.width)); const mh = Math.max(...images.map(i => i.height));
                    let cols = settings.columns > 0 ? settings.columns : Math.ceil(Math.sqrt(images.length));
                    if (cols === 0) cols = 4;
                    const w = cols * mw + (cols - 1) * settings.padding;
                    const h = Math.ceil(images.length / cols) * mh + (Math.ceil(images.length / cols) - 1) * settings.padding;
                    tmp.width = w; tmp.height = h;
                    drawCore(tmp.getContext('2d'), w, h, true);
                    const a = document.createElement('a'); a.download=`sprite_sheet_${Date.now()}.png`; a.href=tmp.toDataURL('image/png'); a.click();
                    showToast("✅ 完美雪碧图导出成功！");

                                        <button className={`btn-status-icon ${isMirrored ? 'active' : ''}`} onClick={() => setIsMirrored(!isMirrored)} title="镜像翻转"><Icons.Mirror size={20} /></button>
                                    </div>
                                    <div className="text-right flex flex-col text-right flex-1 items-end"><span className="text-[9px] font-black uppercase text-gray-400 tracking-widest leading-none">信息 / Info</span><span className="text-[11px] font-mono font-black uppercase text-gray-600 leading-none mt-1">{previewMode==='anim' ? `F:${currentFrame+1}/${images.length}` : `W:${canvasSize.width} H:${canvasSize.height}`}</span></div>
                                </footer>
                            </div>

                            <aside className="w-[320px] bg-white p-4 rounded-[28px] flex flex-col overflow-hidden shrink-0">
                                <div className="bg-gray-50 rounded-[24px] p-5 flex-1 flex flex-col overflow-hidden text-left">
                                    <div className="flex justify-between items-center mb-5 text-left">
                                        <p className="text-[13px] font-black text-gray-400 uppercase tracking-widest leading-none">帧序列 / Sequence ({images.length})</p>
                                        {images.length>0 && <button onClick={clearAll} className="text-[13px] font-black text-red-500 hover:text-red-700 transition-colors uppercase">清空</button>}
                                    </div>
                                    <div className="flex-1 overflow-y-auto custom-scrollbar -mx-2 px-2 space-y-3 text-left">
                                        {images.length===0 ? <div className="text-center text-gray-300 text-[12px] font-black uppercase mt-12 py-8 rounded-[24px] bg-gray-100/50">EMPTY LIST</div> : images.map((img, idx)=>(
                                            <div key={img.id} className={`flex items-center gap-3 p-3 rounded-[20px] transition-all duration-200 ${currentFrame===idx&&previewMode==='anim'?'bg-gray-200':'bg-white hover:bg-gray-100'}`}>
                                                <div className="w-14 h-14 bg-gray-100 rounded-[16px] flex items-center justify-center overflow-hidden shrink-0"><img src={img.url} className="max-w-full max-h-full object-contain" alt="thumb" /></div>
                                                <div className="flex-1 min-w-0 flex flex-col justify-center"><p className="text-[13px] font-black text-gray-900 truncate leading-tight mb-1" title={img.name}>{img.name}</p><p className="text-[11px] font-black text-gray-400 font-mono uppercase leading-tight">{img.width}x{img.height}</p></div>
                                                <div className="flex items-center gap-2 shrink-0">
                                                    <div className="flex flex-col gap-1"><button onClick={()=>moveImage(idx,'up')} disabled={idx===0} className="text-gray-300 hover:text-gray-900 disabled:opacity-20 transition-colors"><Icons.ChevronUp size={14} /></button><button onClick={()=>moveImage(idx,'down')} disabled={idx===images.length-1} className="text-gray-300 hover:text-gray-900 disabled:opacity-20 transition-colors"><Icons.ChevronDown size={14} /></button></div>
                                                    <button onClick={()=>removeImage(img.id)} className="w-10 h-10 flex items-center justify-center bg-red-50 text-red-500 hover:bg-red-100 hover:text-red-700 rounded-[12px] transition-all ml-1 border-none"><Icons.Trash size={16} /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </aside>
                        </main>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
